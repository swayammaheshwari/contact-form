<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>payment form</title>
    <link rel="stylesheet" href="cp 3 style.css">
</head>
<body>
    <div class="container">
        <form action="mailto: arjunsinghlahor189@gmail.com" method="post" enctype="text/plain">
        <h1 class="main-heading">payment form</h1>
        <hr>
        <h2>contact information</h2>
        <p>name:
             <input type="text" name="name" placeholder="mendetary field" required >
        </p>
        <p>
            <fieldset>
                                <legend>gender</legend>
            male <input type="radio" name="gender" id="gender" required>
            female <input type="radio" name="gender" id="gender" required>
            </fieldset>
        </p>
        <p>address: <textarea name="address" id="address" cols="100" rows="5"></textarea></p>
        <p>
            email: <input type="email" name="email" id="email" placeholder="mendetary field" required>
        </p>
            <p>pincode: <input type="number" name="pincode" id="pincode" placeholder="mendetary field" required></p>
            <h2>payment information</h2>
            <p>card type:
                <select name="card_type" id="card_type" placeholder="mendetary field" required>
                    
                    <option value="">--select a card type--</option>
                    <option value="visa">Visa</option>
                    <option value="rupee card">rupee card</option>
                    <option value="mastercard">mastercard</option>
                </select>
            </p>
          <p>
              card number <input type="number" name="card_number" id="card_number" placeholder="mendetary field" required>
          </p>
          <p>
              expiration date: <input type="date" name="exp_date" id="exp_date" placeholder="mendetary field" required>
          </p>
          <p>CVV: <input type="password" name="cvv" id="cvv" placeholder="mendetary field" required></p>  
          <input type="submit" value="pay now">
        </div>
    </form>
</body>
</html>
